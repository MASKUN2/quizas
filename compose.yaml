services:
  postgres:
    image: postgres:17-alpine
    container_name: quizas-postgres
    restart: unless-stopped
    # 로컬 개발 전용 DB. 프로덕션(홈랩)과 무관. 필요 시 .env로 오버라이드.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inho}
      POSTGRES_DB: ${POSTGRES_DB:-quizas}
    ports:
      - "5432:5432"
    volumes:
      - quizas-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inho -d quizas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  quizas-pgdata:
