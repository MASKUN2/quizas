# Argo CD 가 watch 하는 GitOps 소스. CI(.github/workflows/deploy.yml)가 빌드 후
# `kustomize edit set image ...` 로 아래 images 의 newTag(=commit sha)를 갱신 커밋한다.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps
resources:
- manifest.yaml
images:
- name: quizas-api
  newName: ghcr.io/maskun2/quizas-api
  newTag: 231b2ade2d677e2815c214493cec961d1d9f7528
- name: quizas-web
  newName: ghcr.io/maskun2/quizas-web
  newTag: 231b2ade2d677e2815c214493cec961d1d9f7528
